name: Release

# Security: triggered only by tag pushes (write access to tags is restricted to
# repo collaborators). The only `${{ … }}` expansions in `run:` commands come
# from matrix literals and `steps.bin.outputs.*`, both defined in this file.
# `GITHUB_REF_NAME` is the tag name (e.g. `v0.1.0`), validated by the trigger
# pattern below.

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl cross toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Build
        env:
          PYDL_RELEASE_BUILD: "1"
        run: cargo build --verbose --release --target ${{ matrix.target }} -p pydl

      - name: Determine binary name
        id: bin
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            echo "src=target/${{ matrix.target }}/release/pydl.exe" >> "$GITHUB_OUTPUT"
            echo "archive=pydl-${version}-${{ matrix.target }}.zip" >> "$GITHUB_OUTPUT"
          else
            echo "src=target/${{ matrix.target }}/release/pydl" >> "$GITHUB_OUTPUT"
            echo "archive=pydl-${version}-${{ matrix.target }}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: tar -czf "${{ steps.bin.outputs.archive }}" -C "$(dirname "${{ steps.bin.outputs.src }}")" "$(basename "${{ steps.bin.outputs.src }}")"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        # Mirror the tar.gz invocation: cd into the binary's directory and pass
        # only the basename so the archive entries are flat (`pydl.exe`), not
        # nested under `target/<triple>/release/`. Archive path is resolved to
        # an absolute path before the `cd` so it lands at the workspace root
        # where the upload-artifact step expects it.
        run: |
          src_dir="$(dirname "${{ steps.bin.outputs.src }}")"
          src_name="$(basename "${{ steps.bin.outputs.src }}")"
          archive_abs="$PWD/${{ steps.bin.outputs.archive }}"
          (cd "$src_dir" && 7z a "$archive_abs" "$src_name")

      - name: Verify flat archive layout
        shell: bash
        run: |
          archive="${{ steps.bin.outputs.archive }}"
          expected="$(basename "${{ steps.bin.outputs.src }}")"
          case "$archive" in
            *.zip)    listing="$(7z l -slt "$archive" | sed -n 's/^Path = //p' | tail -n +2)" ;;
            *.tar.gz) listing="$(tar -tzf "$archive")" ;;
          esac
          if ! printf '%s\n' "$listing" | grep -Fxq "$expected"; then
            echo "::error::archive $archive does not contain $expected at top level. Listing:"
            printf '%s\n' "$listing"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.bin.outputs.archive }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          # Standard sha256sum format (`<hex>  <filename>`); filenames only
          # (no path prefix) so the verifier can consume lines verbatim.
          sha256sum pydl-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            pydl-*
            SHA256SUMS
