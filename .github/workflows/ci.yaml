name: CI

# Security: this workflow does not interpolate any attacker-controlled GitHub
# context (issue titles, PR bodies, branch names from forks, etc.) into `run:`
# commands. The only `${{ … }}` expansions are matrix literals defined in this
# file and `github.workflow` / `github.ref` (used for concurrency grouping).

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Lint
        run: cargo clippy --workspace --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Build
        run: cargo build --target ${{ matrix.target }}

      - name: Test
        run: cargo test --target ${{ matrix.target }}

  # Build each workspace member in isolation so we catch feature-unification
  # leaks (e.g. a crate relying on features activated only because another
  # workspace member enables them). The workspace build above will happily
  # compile such crates; building them alone will not.
  build-per-crate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [pydl, pydl-cache, pydl-common, get-checksums, check-checksums]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: per-crate-${{ matrix.crate }}

      - name: Build
        run: cargo build -p ${{ matrix.crate }}

      - name: Lint
        run: cargo clippy -p ${{ matrix.crate }} --all-targets -- -D warnings
