# git-cliff configuration for pydl
# https://git-cliff.org/docs/configuration
#
# pydl's commit history is free-form, not Conventional Commits.
# We classify commits via regex on the subject line.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.
Generated from git commits by [git-cliff](https://git-cliff.org).\n
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | trim }}{% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
# Order: first matching pattern wins.
commit_parsers = [
    # Skip version-bump commits — they're the release anchors.
    { message = "^Bump version", skip = true },
    # Skip merge commits.
    { message = "^Merge ", skip = true },

    { message = "^Bump ", group = "Dependencies" },
    # Tooling/CI signals matched before generic Add/Fix so e.g. "Add permissions to workflow" lands in Tooling.
    { message = ".*[Ww]orkflow.*", group = "Tooling" },
    { message = ".*[Cc]lippy.*", group = "Tooling" },
    { message = "^(Install|Pin|Update) ", group = "Tooling" },
    { message = "^Fix", group = "Bug Fixes" },
    { message = "^(Add|Support|New) ", group = "Features" },
    # Everything else is an internal change.
    { message = ".*", group = "Internal" },
]
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
topo_order = false
sort_commits = "oldest"
